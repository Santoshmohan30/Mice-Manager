{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
    <h3>Add New Strain Sheet</h3>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Strain Name</label>
            <input type="text" name="strain" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Strain</button>
    </form>
</div>
{% endblock %}
