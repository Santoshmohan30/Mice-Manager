{% extends 'layout.html' %}

{% block content %}
<h2>Lab Calendar</h2>

<!-- Adding Event Form -->
<form method="POST" action="{{ url_for('add_calendar_event') }}">
  <div class="form-group">
    <label for="title">Title:</label>
    <input type="text" name="title" class="form-control" required>
  </div>

  <div class="form-group">
    <label for="date">Date:</label>
    <input type="date" name="date" class="form-control" required>
  </div>

  <div class="form-group">
    <label for="category">Category:</label>
    <input type="text" name="category" class="form-control">
  </div>

  <div class="form-group">
    <label for="notes">Notes:</label>
    <textarea name="notes" class="form-control" rows="2"></textarea>
  </div>

  <div class="form-group">
    <label for="notify">Notify (buffalo.edu):</label>
    <input type="email" name="notify" class="form-control" placeholder="sjena@buffalo.edu">
  </div>

  <button type="submit" class="btn btn-primary w-100 my-3"> Add Event</button>
</form>

<!-- Displaying Events -->
<ul class="list-group mt-4">
  {% for event in events %}
    <li class="list-group-item">
      <strong>{{ event.date }}</strong> — {{ event.title }} ({{ event.category }})<br>
      {{ event.notes }}

      <!-- Delete button -->
      <form method="POST" action="{{ url_for('delete_calendar_event', event_id=event.id) }}" class="mt-2">
        <button type="submit" class="btn btn-danger w-100"
                onclick="return confirm('Are you sure you want to delete this event?')">
           Delete
        </button>
      </form>
    </li>
  {% else %}
    <li class="list-group-item">No events yet.</li>
  {% endfor %}
</ul>
{% endblock %}
