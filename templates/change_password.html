{% extends "layout.html" %}
{% block title %}Change Password · Mice Manager{% endblock %}
{% block content %}
<div class="section-header">
  <div>
    <h2>Change Password</h2>
    <p class="subtitle">Manage your colony with joy.</p>
  </div>
</div>

<form method="POST">
  {{ csrf_input() }}
  <div class="form-grid">
    <div class="field full">
      <label for="current_password">Current password</label>
      <input id="current_password" name="current_password" type="password" required>
    </div>
    <div class="field">
      <label for="new_password">New password</label>
      <input id="new_password" name="new_password" type="password" required>
    </div>
    <div class="field">
      <label for="confirm_password">Confirm new password</label>
      <input id="confirm_password" name="confirm_password" type="password" required>
    </div>
  </div>
  <div class="actions" style="margin-top: 16px;">
    <button type="submit" class="button success">Update Password</button>
    <a href="{{ url_for('dashboard') }}" class="button secondary">Cancel</a>
  </div>
</form>
{% endblock %}
