name: mice_manager_flutter
description: Offline-first cross-platform mice management system for macOS and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  excel: ^4.0.6
  file_selector: ^1.0.3
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.2.0
  mobile_scanner: ^7.1.3
  path: ^1.9.1
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
